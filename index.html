// ─── AUTH ─────────────────────────────────────────────────────────────────────

// Pantalla de inicio de sesión. Es lo primero que ve el usuario al abrir la app.
// Convierte el nombre de usuario a mayúsculas automáticamente mientras se escribe.
// Al hacer clic en "Ingresar":
//   1. Valida que ambos campos estén completos
//   2. Llama al servidor con el usuario y la contraseña
//   3. Si es correcto: llama a onLogin con los datos del usuario y el token de sesión
//   4. Si es incorrecto: muestra el mensaje de error del servidor (usuario no encontrado, contraseña incorrecta)
// El botón muestra "Ingresando..." mientras espera la respuesta del servidor.
function LoginScreen({ onLogin }) {
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError]       = useState("");
  const [loading, setLoading]   = useState(false);

  async function handleSubmit(e) {
    e.preventDefault();
    if (!username||!password) return setError("Completá usuario y contraseña.");
    setLoading(true); setError("");
    const r = await gasCall("login", { username:username.trim(), password });
    setLoading(false);
    if (!r.ok) return setError(r.error||"Error de acceso.");
    onLogin(r.user, r.token);
  }
  return (
    <div className="auth-screen">
      <form className="auth-card" onSubmit={handleSubmit}>
        <div className="auth-logo">SIGT v1.0</div>
        <div className="auth-title">Bienvenido</div>
        <div className="auth-sub">Sistema Integral de Gestión de Transporte</div>
        {error && <div className="alert alert-danger">{error}</div>}
        <div className="form-group">
          <label className="form-label">Usuario</label>
          <input className="form-input" value={username} onChange={e=>setUsername(e.target.value.toUpperCase())} placeholder="Ej: SOL" autoFocus/>
        </div>
        <div className="form-group">
          <label className="form-label">Contraseña</label>
          <input type="password" className="form-input" value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••"/>
        </div>
        <button className="btn btn-primary btn-full" disabled={loading}>{loading?"Ingresando...":"Ingresar"}</button>
        <div style={{ marginTop:16, fontSize:11, color:"var(--text3)", textAlign:"center" }}>
          Credenciales iniciales: usuario = contraseña (ej: SOL / SOL)
        </div>
      </form>
    </div>
  );
}

// Pantalla de cambio de contraseña obligatorio. Aparece automáticamente
// la primera vez que un usuario ingresa al sistema (cuando mustChangePassword es true).
// Validaciones que hace antes de enviar al servidor:
//   - La contraseña anterior debe ser correcta
//   - La nueva contraseña debe tener al menos 6 caracteres
//   - Solo acepta letras y números (sin símbolos ni espacios)
//   - La confirmación debe coincidir con la nueva contraseña
// Muestra una barra de progreso de fortaleza mientras el usuario escribe la nueva contraseña.
// Al completarse exitosamente llama a onDone, que lleva al usuario al módulo principal.
function ChangePasswordScreen({ username, onDone }) {
  const [old, setOld] = useState("");  // contraseña anterior
  const [nw, setNw]   = useState("");  // nueva contraseña
  const [rep, setRep] = useState("");  // repetición de la nueva contraseña
  const [error, setError]     = useState("");
  const [loading, setLoading] = useState(false);
  const str = pwStrength(nw); // calcula la fortaleza de la nueva contraseña en tiempo real

  async function handleSubmit(e) {
    e.preventDefault(); setError("");
    if (!old)             return setError("Ingresá la contraseña anterior.");
    if (nw.length < 6)    return setError("Mínimo 6 caracteres.");
    if (!isAlphanumeric(nw)) return setError("Solo letras y números.");
    if (nw !== rep)       return setError("Las contraseñas no coinciden.");
    setLoading(true);
    const r = await gasCall("changePassword", { username, oldPassword:old, newPassword:nw });
    setLoading(false);
    if (!r.ok) return setError(r.error||"Error al cambiar contraseña.");
    onDone();
  }
  return (
    <div className="auth-screen">
      <form className="auth-card" onSubmit={handleSubmit} style={{ width:420 }}>
        <div className="auth-logo">SIGT v1.0</div>
        <div className="auth-title">Cambio de contraseña obligatorio</div>
        <div className="auth-sub">Primer ingreso — establecé tu nueva contraseña.</div>
        {error && <div className="alert alert-danger">{error}</div>}
        <div className="form-group">
          <label className="form-label">Usuario</label>
          <div className="field-readonly">{username}</div>
        </div>
        <div className="form-group">
          <label className="form-label">Contraseña anterior</label>
          <input type="password" className="form-input" value={old} onChange={e=>setOld(e.target.value)} autoFocus/>
        </div>
        <div className="form-group">
          <label className="form-label">Nueva contraseña</label>
          <input type="password" className="form-input" value={nw} onChange={e=>setNw(e.target.value)} placeholder="Mínimo 6 caracteres alfanuméricos"/>
          {nw && <><div className="pw-strength"><div className="pw-strength-bar" style={{ width:str.pct, background:str.color }}/></div><div className="form-hint" style={{ color:str.color }}>{str.label}</div></>}
        </div>
        <div className="form-group">
          <label className="form-label">Repetir contraseña</label>
          <input type="password" className="form-input" value={rep} onChange={e=>setRep(e.target.value)}/>
          {rep && nw!==rep && <div className="form-error">No coinciden</div>}
        </div>
        <button className="btn btn-primary btn-full" disabled={loading}>{loading?"Guardando...":"Cambiar contraseña"}</button>
      </form>
    </div>
  );
}

// ─── MODULE RENDERER ──────────────────────────────────────────────────────────
// Decide qué módulo mostrar según el número de módulo activo.
// Pasa a cada módulo las mismas props base:
//   session   — datos del usuario logueado (username, token)
//   canEdit   — true si el usuario tiene permiso de edición en este módulo
//   dropdowns — todas las listas de opciones para los desplegables
//   notif     — función para mostrar mensajes emergentes
// Los módulos 4 al 7 todavía no están implementados → muestran un cartel "próximamente".
function ModuleRenderer({ moduleId, session, canEdit, dropdowns, notif }) {
  const props = { session, canEdit, dropdowns, notif };
  if (moduleId===1) return <Module1 {...props}/>;
  if (moduleId===2) return <Module2 {...props}/>;
  if (moduleId===3) return <Module3 {...props}/>;
  return (
    <div className="module-container">
      <div className="empty"><div className="empty-icon">🔧</div><p>Módulo {moduleId} — próximamente</p></div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// MODULE 1 — INICIO DE VIAJE
// ═══════════════════════════════════════════════════════════════════════════════
function Module1({ session, canEdit, dropdowns, notif }) {
  const [view, setView]         = useState("list");
  const [trips, setTrips]       = useState([]);
  const [editTrip, setEditTrip] = useState(null);
  const [loading, setLoading]   = useState(true);
  const [histView, setHistView] = useState(false);

  useEffect(() => { loadTrips(); }, []);
  async function loadTrips() {
    setLoading(true);
    // Usa caché: si los datos ya están en memoria no hace llamada al servidor
    const r = await cachedGet("getTrips", "trips");
    if (r.ok) setTrips(r.data);
    setLoading(false);
  }
  async function handleSave(tripData) {
    const r = await gasCall("saveTrip", { trip:tripData, user:session.username });
    if (r.ok) {
      invalidateCache("trips"); // fuerza recarga después de guardar
      notif.add("Viaje guardado"); loadTrips(); setView("list");
    } else notif.add(r.error||"Error al guardar","error");
  }
  async function handleFinalize(tripId) {
    const r = await gasCall("finalizeTrip", { tripId, user:session.username });
    if (r.ok) {
      invalidateCache("trips"); // fuerza recarga después de finalizar
      notif.add("Viaje finalizado"); loadTrips(); setView("list");
    } else notif.add(r.error||"Error al finalizar","error");
  }

  if (view==="form") return (
    <TripForm trip={editTrip} trips={trips} dropdowns={dropdowns}
      canEdit={canEdit} session={session}
      onSave={handleSave} onFinalize={handleFinalize} onBack={() => setView("list")}/>
  );

  const active = trips.filter(t => t.status!=="finalizado");
  const hist   = trips.filter(t => t.status==="finalizado");
  const shown  = histView ? hist : active;

  return (
    <div className="module-container">
      <div className="module-header">
        <div>
          <div className="module-title">🚚 Inicio de Viaje</div>
          <div className="module-subtitle">{histView ? "Historial de viajes finalizados" : `${active.length} viaje(s) activo(s)`}</div>
        </div>
        <div className="module-actions">
          <button className="btn btn-secondary btn-sm" onClick={() => setHistView(!histView)}>
            {histView ? "← Activos" : "Ver Historial"}
          </button>
          {!histView && canEdit && (
            <button className="btn btn-primary btn-sm" onClick={() => { setEditTrip(null); setView("form"); }}>
              + Nuevo Viaje
            </button>
          )}
        </div>
      </div>
      {loading
        ? <div style={{ textAlign:"center",padding:32 }}><div className="spinner" style={{ margin:"0 auto" }}/></div>
        : shown.length===0
          ? <div className="empty"><div className="empty-icon">{histView?"📂":"🚚"}</div><p>{histView?"No hay viajes finalizados.":"No hay viajes activos."}</p></div>
          : (
            <div className="table-wrap">
              <table>
                <thead><tr>
                  <th></th><th>ID Viaje</th><th>Carga</th><th>Tipo</th><th>Cliente</th>
                  <th>Monto Factura</th><th>Tramos</th><th>KM total</th><th>Estado doc.</th>
                  {histView && <th>Finalizado</th>}
                </tr></thead>
                <tbody>
                  {shown.map(t => {
                    const totalKm = (t.segments||[]).reduce((s,sg)=>s+Number(sg.kmPrevistos||0),0);
                    return (
                      <tr key={t.id}>
                        <td>
                          <button className="btn btn-secondary btn-icon btn-sm"
                            onClick={() => { setEditTrip(t); setView("form"); }} title="Ver/Editar">🔍</button>
                        </td>
                        <td><span style={{ fontFamily:"var(--mono)",fontSize:12 }}>{t.id}</span></td>
                        <td>{t.carga}</td>
                        <td>{t.tipoCarga}</td>
                        <td>{t.cliente}</td>
                        <td style={{ fontFamily:"var(--mono)" }}>{t.montoFactura} {t.moneda}</td>
                        <td><span className="badge badge-gray">{(t.segments||[]).length}</span></td>
                        <td style={{ fontFamily:"var(--mono)",fontSize:12 }}>{totalKm>0?totalKm.toLocaleString("es-AR"):"—"}</td>
                        <td><StatusBadge status={t.statusDoc||"incompleto"}/></td>
                        {histView && <td style={{ fontSize:11,color:"var(--text3)" }}>{fmtDate(t.finalizedAt)}</td>}
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )
      }
    </div>
  );
}

// ─── TRIP FORM ────────────────────────────────────────────────────────────────
function TripForm({ trip, trips, dropdowns, canEdit, session, onSave, onFinalize, onBack }) {
  const isFinalized = trip?.status === "finalizado";
  const readonly    = !canEdit || isFinalized;
  const isNew       = !trip;

  const lugares = dropdowns.LUGARES || [];

  // FIX #1 — ID generado con NAC/INT
  const [id, setId] = useState(() =>
    trip?.id || generateTripId(trips, [], lugares)
  );

  // FIX #1 — hoja "CARGAS" = mercadería (lista simple)
  const [carga,         setCarga]         = useState(trip?.carga         || "");
  // FIX #1 — hoja "TIPO DE CARGA" = método de transporte
  const [tipoCarga,     setTipoCarga]     = useState(trip?.tipoCarga     || "");
  // Sub-campos dinámicos del tipo de carga
  const [pies,          setPies]          = useState(trip?.pies          || "");
  const [clasificacion, setClasificacion] = useState(trip?.clasificacion || "");
  const [cantidad,      setCantidad]      = useState(trip?.cantidad      || "");

  const [montoFactura, setMontoFactura] = useState(trip?.montoFactura || "");
  const [moneda,       setMoneda]       = useState(trip?.moneda       || "USD");
  const [cliente,      setCliente]      = useState(trip?.cliente      || "");
  const [segments,     setSegments]     = useState(trip?.segments     || [makeNewSegment(id, 1, "", "")]);
  const [numMIC,       setNumMIC]       = useState(trip?.numMIC       || "");
  const [fechaMIC,     setFechaMIC]     = useState(trip?.fechaMIC     || "");
  const [numCRT,       setNumCRT]       = useState(trip?.numCRT       || "");
  const [fechaCRT,     setFechaCRT]     = useState(trip?.fechaCRT     || "");
  const [statusDoc,    setStatusDoc]    = useState(trip?.statusDoc    || "incompleto");
  const [obsDoc,       setObsDoc]       = useState(trip?.obsDoc       || "");
  const [saving,       setSaving]       = useState(false);
  const [errors,       setErrors]       = useState({});

  // FIX #1 — TIPO DE CARGA proviene de hoja "TIPO DE CARGA"
  const tiposSource = dropdowns.TIPO_DE_CARGA || [];
  const isContenedor = tipoCarga === "CONTENEDOR";

  // Opciones únicas para el dropdown de Tipo de Carga
  const tipoOptions = useMemo(() => {
    const seen = new Set(); const out = [];
    tiposSource.forEach(r => {
      if (!seen.has(r.nombre)) { seen.add(r.nombre); out.push(r.nombre); }
    });
    return out;
  }, [tiposSource]);

  // Fila de la hoja para el tipo seleccionado
  const tipoRow = useMemo(() => {
    if (!tipoCarga || isContenedor) return null;
    return tiposSource.find(r => r.nombre === tipoCarga) || null;
  }, [tipoCarga, isContenedor, tiposSource]);

  const showUM    = tipoRow && tipoRow.um            !== "-";
  const showClasif = tipoRow && tipoRow.clasificacion !== "-";
  const showCant  = tipoRow && tipoRow.cantidad      !== "-";
  const cantIsInput = tipoRow && tipoRow.cantidad === "";

  useEffect(() => {
    setPies(""); setClasificacion("");
    setCantidad(!isContenedor && tipoRow && tipoRow.cantidad !== "-" && tipoRow.cantidad !== "" ? tipoRow.cantidad : "");
  }, [tipoCarga]);

  useEffect(() => { if (isContenedor) setClasificacion(""); }, [pies]);

  // FIX #1 — Recalcular NAC/INT cuando cambian los tramos
  useEffect(() => {
    if (!isNew) return; // solo para viajes nuevos en creación
    const newId = recalcPrefix(id, segments, lugares);
    if (newId !== id) setId(newId);
  }, [segments]);

  // KM total reactivo
  const totalKm = useMemo(() =>
    segments.reduce((s,sg) => s+Number(sg.kmPrevistos||0), 0)
  , [segments]);

  function makeNewSegment(tripId, seq, desde, hasta) {
    // FIX #2 — segId incluye desde-hasta
    const segId = makeSegmentId(tripId, desde, hasta, seq);
    // FIX #8 — km previstos automático
    const kmAuto = getKmPrevistos(desde, hasta);
    return {
      segId, desde, fechaInicio:"", hasta, fechaLlegadaPrevista:"",
      chofer:"", tractor:"", semi:"", fechaLlegadaReal:"",
      kmPrevistos: kmAuto !== null ? kmAuto : 0,
      kmManual: kmAuto === null, // true = el usuario debe ingresar manualmente
      status:"stand by", observaciones:""
    };
  }

  function addSegment() {
    setSegments(p => [...p, makeNewSegment(id, p.length+1, "", "")]);
  }
  function removeSegment(i) {
    if (segments.length>1) setSegments(p => p.filter((_,idx) => idx!==i));
  }
  function updateSeg(i, key, val) {
    setSegments(p => {
      const n = [...p];
      n[i] = { ...n[i], [key]:val };
      // FIX #2 + #8 — recalcular segId y km si cambia desde/hasta
      if (key==="desde" || key==="hasta") {
        const d = key==="desde" ? val : n[i].desde;
        const h = key==="hasta" ? val : n[i].hasta;
        n[i].segId = makeSegmentId(id, d, h, i+1);
        const kmAuto = getKmPrevistos(d, h);
        if (kmAuto !== null) { n[i].kmPrevistos = kmAuto; n[i].kmManual = false; }
        else { n[i].kmManual = true; } // mantiene el valor que tenía, usuario puede editar
      }
      return n;
    });
  }

  // FIX #5 — Validación completa de tramos
  function validate() {
    const e = {};
    if (!carga)         e.carga = "Requerido";
    if (!tipoCarga)     e.tipoCarga = "Requerido";
    if (carga!=="VACIO") {
      if (!montoFactura) e.montoFactura = "Requerido";
      if (isContenedor) {
        if (!pies)          e.pies = "Requerido";
        if (!clasificacion) e.clasificacion = "Requerido";
      } else if (tipoRow && cantIsInput && !cantidad) {
        e.cantidad = "Requerido";
      }
    }
    if (!cliente)  e.cliente = "Requerido";
    if (!numMIC)   e.numMIC = "Requerido";
    if (!fechaCRT) e.fechaCRT = "Requerido";
    setErrors(e);
    return Object.keys(e).length===0;
  }

  // FIX #5 — Validación extra para FINALIZAR: todos los campos de cada tramo
  function validateSegments() {
    for (let i=0; i<segments.length; i++) {
      const s = segments[i];
      if (!s.desde)             { alert(`Tramo ${i+1}: falta "Desde".`); return false; }
      if (!s.fechaInicio)       { alert(`Tramo ${i+1}: falta "Fecha inicio".`); return false; }
      if (!s.hasta)             { alert(`Tramo ${i+1}: falta "Hasta".`); return false; }
      if (!s.fechaLlegadaPrevista) { alert(`Tramo ${i+1}: falta "Fecha prevista llegada".`); return false; }
      if (!s.chofer)            { alert(`Tramo ${i+1}: falta "Chofer".`); return false; }
      if (!s.tractor)           { alert(`Tramo ${i+1}: falta "Tractor".`); return false; }
      if (!s.semi)              { alert(`Tramo ${i+1}: falta "Semi".`); return false; }
      if (!s.fechaLlegadaReal)  { alert(`Tramo ${i+1}: falta "Fecha real llegada".`); return false; }
      if (!s.kmPrevistos && s.kmPrevistos!==0) { alert(`Tramo ${i+1}: falta "Km previstos".`); return false; }
      if (s.status !== "completado") { alert(`Tramo ${i+1}: el estado debe ser "completado" para finalizar.`); return false; }
    }
    return true;
  }

  function buildData(extraStatus) {
    const umToSave = isContenedor ? "UN" : (tipoRow ? tipoRow.um : "");
    return {
      id, carga, tipoCarga,
      um: umToSave,
      pies: isContenedor ? pies : "",
      clasificacion: isContenedor ? clasificacion : (tipoRow ? tipoRow.clasificacion : ""),
      cantidad: isContenedor ? (cantidad||"1") : (cantIsInput ? cantidad : (tipoRow?.cantidad||"")),
      montoFactura, moneda, cliente, segments,
      numMIC, fechaMIC, numCRT, fechaCRT,
      statusDoc: extraStatus==="finalizado" ? "completo" : statusDoc,
      obsDoc,
      status: extraStatus || trip?.status || "activo"
    };
  }

  async function handleSave() {
    if (!validate()) return;
    setSaving(true);
    await onSave(buildData());
    setSaving(false);
  }

  async function handleFinalize() {
    if (!validate()) return;
    if (!validateSegments()) return;
    setSaving(true);
    await onSave(buildData("finalizado"));
    await onFinalize(id);
    setSaving(false);
  }

  return (
    <div className="module-container">
      <div className="module-header">
        <div>
          <div className="module-title">
            {isNew ? "Nuevo Viaje" : `Viaje ${id}`}
            {isFinalized && <span className="readonly-badge" style={{ marginLeft:10 }}>🔒 Finalizado</span>}
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:12, marginTop:4 }}>
            <span style={{ fontFamily:"var(--mono)", fontSize:12, color:"var(--text3)" }}>{id}</span>
            <span className="km-total">📍 {totalKm>0?totalKm.toLocaleString("es-AR"):"0"} km totales</span>
          </div>
        </div>
        <button className="btn btn-secondary btn-sm" onClick={onBack}>← Volver</button>
      </div>

      {/* CARD 1: Información general */}
      <div className="card" style={{ marginBottom:16 }}>
        <div className="card-header"><div className="card-title">📋 Información General</div></div>
        <div className="card-body">
          <div className="form-row" style={{ marginBottom:4 }}>
            <div className="form-group" style={{ maxWidth:220 }}>
              <label className="form-label">ID Viaje</label>
              <div className="field-readonly">{id}</div>
            </div>
          </div>

          {/* Carga + Tipo de Carga */}
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">
                Carga {errors.carga && <span className="form-error">{errors.carga}</span>}
              </label>
              {/* FIX #1 — Hoja "CARGAS" col A */}
              <SearchableSelect
                options={dropdowns.CARGAS || []}
                value={carga}
                onChange={v => setCarga(v)}
                placeholder="Seleccioná mercadería..."
                disabled={readonly}
              />
            </div>
            <div className="form-group">
              <label className="form-label">
                Tipo de Carga {errors.tipoCarga && <span className="form-error">{errors.tipoCarga}</span>}
              </label>
              {/* FIX #1 — Hoja "TIPO DE CARGA" col A */}
              <SearchableSelect
                options={tipoOptions}
                value={tipoCarga}
                onChange={v => setTipoCarga(v)}
                placeholder="A Granel, Contenedor..."
                disabled={readonly}
              />
            </div>
          </div>

          {/* Campos dinámicos según Tipo de Carga */}
          {tipoCarga && carga !== "VACIO" && (
            isContenedor ? (
              <div className="form-row">
                <div className="form-group" style={{ minWidth:150 }}>
                  <label className="form-label">Pies {errors.pies && <span className="form-error">{errors.pies}</span>}</label>
                  <SearchableSelect
                    options={[{value:"40 PIES",label:"40 PIES"},{value:"20 PIES",label:"20 PIES"}]}
                    value={pies} onChange={v=>setPies(v)}
                    placeholder="20 / 40..." disabled={readonly}
                  />
                </div>
                {pies && (
                  <div className="form-group" style={{ minWidth:200 }}>
                    <label className="form-label">Clasificación {errors.clasificacion && <span className="form-error">{errors.clasificacion}</span>}</label>
                    <SearchableSelect
                      options={[{value:"REFRIGERADO",label:"REFRIGERADO"},{value:"NO REFRIGERADO",label:"NO REFRIGERADO"}]}
                      value={clasificacion} onChange={v=>setClasificacion(v)}
                      placeholder="Refrigerado..." disabled={readonly}
                    />
                  </div>
                )}
                <div className="form-group" style={{ minWidth:80 }}>
                  <label className="form-label">UM</label>
                  <div className="field-readonly">UN</div>
                </div>
                <div className="form-group" style={{ minWidth:120 }}>
                  <label className="form-label">Cantidad</label>
                  <input className="form-input" type="number" min="1" step="1"
                    value={cantidad||"1"} onChange={e=>setCantidad(e.target.value)} disabled={readonly}/>
                </div>
              </div>
            ) : tipoRow ? (
              <div className="form-row">
                {showUM && (
                  <div className="form-group" style={{ minWidth:100 }}>
                    <label className="form-label">UM</label>
                    <div className="field-readonly">{tipoRow.um}</div>
                  </div>
                )}
                {showClasif && (
                  <div className="form-group" style={{ minWidth:140 }}>
                    <label className="form-label">Clasificación</label>
                    <div className="field-readonly">{tipoRow.clasificacion}</div>
                  </div>
                )}
                {showCant && (
                  <div className="form-group" style={{ minWidth:140 }}>
                    <label className="form-label">
                      Cantidad {errors.cantidad && <span className="form-error">{errors.cantidad}</span>}
                    </label>
                    {cantIsInput
                      ? <input className="form-input" type="number" min="0" step="0.01"
                          value={cantidad} onChange={e=>setCantidad(e.target.value)} disabled={readonly} placeholder="Ingresá cantidad"/>
                      : <div className="field-readonly">{tipoRow.cantidad}</div>
                    }
                  </div>
                )}
              </div>
            ) : null
          )}

          {/* Monto + Cliente */}
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Monto Factura {errors.montoFactura && <span className="form-error">{errors.montoFactura}</span>}</label>
              <div className="input-with-currency">
                <MoneyInput value={montoFactura} onChange={setMontoFactura} placeholder="0" disabled={readonly}/>
                <select className="form-select" style={{ width:80 }} value={moneda} onChange={e=>setMoneda(e.target.value)} disabled={readonly}>
                  {CURRENCIES.map(c=><option key={c} value={c}>{c}</option>)}
                </select>
              </div>
            </div>
            <div className="form-group">
              <label className="form-label">Cliente {errors.cliente && <span className="form-error">{errors.cliente}</span>}</label>
              {/* FIX #1 — hoja "CLIENTES" col A */}
              <SearchableSelect options={dropdowns.CLIENTES||[]} value={cliente} onChange={setCliente} placeholder="Buscar cliente..." disabled={readonly}/>
            </div>
          </div>
        </div>
      </div>

      {/* CARD 2: Tramos */}
      <div className="card" style={{ marginBottom:16 }}>
        <div className="card-header">
          <div className="card-title">
            🗺 Tramos del Viaje
            <span className="km-total" style={{ marginLeft:8 }}>
              {totalKm>0?totalKm.toLocaleString("es-AR"):"0"} km totales
            </span>
          </div>
        </div>
        <div className="card-body">
          {segments.map((seg,i) => (
            <SegmentCard
              key={seg.segId+i}
              seg={seg} idx={i} total={segments.length}
              dropdowns={dropdowns} readonly={readonly}
              onChange={(k,v) => updateSeg(i,k,v)}
              onRemove={() => removeSegment(i)}
              onAdd={addSegment}
              isLast={i===segments.length-1}
            />
          ))}
        </div>
      </div>

      {/* CARD 3: Documentación */}
      <div className="card" style={{ marginBottom:80 }}>
        <div className="card-header"><div className="card-title">📄 Documentación</div></div>
        <div className="card-body">
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">N° MIC {errors.numMIC && <span className="form-error">{errors.numMIC}</span>}</label>
              <input className="form-input" value={numMIC} onChange={e=>setNumMIC(e.target.value)} disabled={readonly}/>
            </div>
            <div className="form-group">
              <label className="form-label">Fecha MIC</label>
              <input type="date" className="form-input" value={fechaMIC} onChange={e=>setFechaMIC(e.target.value)} disabled={readonly}/>
            </div>
            <div className="form-group">
              <label className="form-label">N° CRT</label>
              <input className="form-input" value={numCRT} onChange={e=>setNumCRT(e.target.value)} disabled={readonly}/>
            </div>
            <div className="form-group">
              <label className="form-label">Fecha CRT {errors.fechaCRT && <span className="form-error">{errors.fechaCRT}</span>}</label>
              <input type="date" className="form-input" value={fechaCRT} onChange={e=>setFechaCRT(e.target.value)} disabled={readonly}/>
            </div>
          </div>
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Estado documentación</label>
              <select className="form-select" value={statusDoc} onChange={e=>setStatusDoc(e.target.value)} disabled={readonly}>
                <option value="incompleto">Incompleto</option>
                <option value="completo">Completo</option>
              </select>
            </div>
            <div className="form-group" style={{ flex:3 }}>
              <label className="form-label">Observaciones</label>
              <input className="form-input" value={obsDoc} onChange={e=>setObsDoc(e.target.value)} disabled={readonly} placeholder="Opcional"/>
            </div>
          </div>
        </div>
      </div>

      {!readonly && (
        <div className="save-bar">
          <button className="btn btn-secondary" onClick={onBack}>Cancelar</button>
          <button className="btn btn-success" onClick={handleFinalize} disabled={saving}>🏁 Finalizar Viaje</button>
          <button className="btn btn-primary" onClick={handleSave} disabled={saving}>{saving?"Guardando...":"💾 Guardar"}</button>
        </div>
      )}
    </div>
  );
}

// ─── SEGMENT CARD ─────────────────────────────────────────────────────────────
function SegmentCard({ seg, idx, total, dropdowns, readonly, onChange, onRemove, onAdd, isLast }) {
  const [open, setOpen] = useState(true);
  return (
    <div className="segment-card">
      <div className="segment-header">
        <div onClick={() => setOpen(!open)} style={{ flex:1, display:"flex", alignItems:"center", gap:10, cursor:"pointer" }}>
          {/* FIX #2 — segId muestra desde-hasta */}
          <span style={{ fontFamily:"var(--mono)", fontSize:11, color:"var(--text3)" }}>{seg.segId}</span>
          {seg.kmPrevistos>0 && (
            <span style={{ fontFamily:"var(--mono)", fontSize:11, color:"var(--accent)" }}>
              {Number(seg.kmPrevistos).toLocaleString("es-AR")} km
            </span>
          )}
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:6 }}>
          <StatusBadge status={seg.status}/>
          {!readonly && total>1 && (
            <button className="btn btn-danger btn-sm btn-icon" onClick={e=>{e.stopPropagation();onRemove();}} title="Eliminar tramo">✕</button>
          )}
          {!readonly && isLast && (
            <button className="btn btn-primary btn-sm" onClick={e=>{e.stopPropagation();onAdd();}} title="Agregar tramo">+ Tramo</button>
          )}
          <span onClick={()=>setOpen(!open)} style={{ color:"var(--text3)", fontSize:12, cursor:"pointer", userSelect:"none" }}>
            {open?"▲":"▼"}
          </span>
        </div>
      </div>

      {open && (
        <div className="segment-body">
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Desde</label>
              {/* FIX #1 — hoja "LUGARES" col A */}
              <SearchableSelect options={dropdowns.LUGARES||[]} value={seg.desde} onChange={v=>onChange("desde",v)} placeholder="Origen..." disabled={readonly}/>
            </div>
            <div className="form-group">
              <label className="form-label">Fecha inicio viaje</label>
              <input type="date" className="form-input" value={seg.fechaInicio} onChange={e=>onChange("fechaInicio",e.target.value)} disabled={readonly}/>
            </div>
            <div className="form-group">
              <label className="form-label">Hasta</label>
              {/* FIX #1 — hoja "LUGARES" col A */}
              <SearchableSelect options={dropdowns.LUGARES||[]} value={seg.hasta} onChange={v=>onChange("hasta",v)} placeholder="Destino..." disabled={readonly}/>
            </div>
            <div className="form-group">
              <label className="form-label">Fecha prevista llegada</label>
              <input type="date" className="form-input" value={seg.fechaLlegadaPrevista} onChange={e=>onChange("fechaLlegadaPrevista",e.target.value)} disabled={readonly}/>
            </div>
          </div>
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Chofer</label>
              {/* FIX #1 — hoja "CHOFERES" col A */}
              <SearchableSelect options={dropdowns.CHOFERES||[]} value={seg.chofer} onChange={v=>onChange("chofer",v)} placeholder="Buscar chofer..." disabled={readonly}/>
            </div>
            <div className="form-group">
              <label className="form-label">Tractor</label>
              {/* FIX #1 — hoja "CAMIONES" col A */}
              <SearchableSelect options={dropdowns.CAMIONES||[]} value={seg.tractor} onChange={v=>onChange("tractor",v)} placeholder="Buscar tractor..." disabled={readonly}/>
            </div>
            <div className="form-group">
              <label className="form-label">Semi</label>
              {/* FIX #1 — hoja "SEMIS" col A */}
              <SearchableSelect options={dropdowns.SEMIS||[]} value={seg.semi} onChange={v=>onChange("semi",v)} placeholder="Buscar semi..." disabled={readonly}/>
            </div>
            <div className="form-group">
              <label className="form-label">Fecha real llegada</label>
              <input type="date" className="form-input" value={seg.fechaLlegadaReal} onChange={e=>onChange("fechaLlegadaReal",e.target.value)} disabled={readonly}/>
            </div>
          </div>
          <div className="form-row">
            <div className="form-group" style={{ maxWidth:200 }}>
              <label className="form-label">
                Km previstos
                {/* FIX #8 — automático si está en tabla, manual si no */}
                {!readonly && seg.kmManual && <span className="form-hint" style={{ marginLeft:4 }}>(manual)</span>}
                {!readonly && !seg.kmManual && <span className="form-hint" style={{ marginLeft:4 }}>(auto)</span>}
              </label>
              {readonly || !seg.kmManual
                ? <div className="field-readonly">{seg.kmPrevistos>0?fmtKm(seg.kmPrevistos):"—"}</div>
                : <input className="form-input" type="number" min="0"
                    value={seg.kmPrevistos||""} placeholder="km"
                    onChange={e=>onChange("kmPrevistos",Number(e.target.value)||0)}/>
              }
            </div>
            <div className="form-group">
              <label className="form-label">Estado</label>
              <select className="form-select" value={seg.status} onChange={e=>onChange("status",e.target.value)} disabled={readonly}>
                {SEGMENT_STATUSES.map(s=><option key={s} value={s}>{s}</option>)}
              </select>
            </div>
            <div className="form-group" style={{ flex:3 }}>
              <label className="form-label">Observaciones</label>
              <input className="form-input" value={seg.observaciones} onChange={e=>onChange("observaciones",e.target.value)} disabled={readonly} placeholder="Opcional"/>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// MODULE 2 — ENTREGA DE PLATA
// ═══════════════════════════════════════════════════════════════════════════════
function Module2({ session, canEdit, dropdowns, notif }) {
  const [view, setView]         = useState("list");
  const [entregas, setEntregas] = useState([]);
  const [loading, setLoading]   = useState(true);

  useEffect(() => { loadEntregas(); }, []);
  async function loadEntregas() {
    setLoading(true);
    // Usa caché: si los datos ya están en memoria no hace llamada al servidor
    const r = await cachedGet("getEntregas", "entregas");
    if (r.ok) setEntregas(r.data);
    setLoading(false);
  }
  async function handleSave(data) {
    const r = await gasCall("saveEntrega", { entrega:data, user:session.username });
    if (r.ok) {
      invalidateCache("entregas"); // fuerza recarga después de guardar
      notif.add("Entrega registrada"); loadEntregas(); setView("list");
    } else notif.add(r.error||"Error al guardar","error");
  }

  if (view==="form") return <EntregaForm dropdowns={dropdowns} onSave={handleSave} onBack={()=>setView("list")}/>;

  return (
    <div className="module-container">

function EntregaForm({ dropdowns, onSave, onBack }) {
  const [fecha,       setFecha]       = useState(nowISO());
  const [chofer,      setChofer]      = useState("");
  const [responsable, setResponsable] = useState("");
  // Montos: una fila por divisa, el usuario activa las que necesita
  // { moneda, monto } — solo se guardan las que tengan monto > 0
  const [montos, setMontos] = useState([
    { moneda:"USD", monto:"" },
    { moneda:"ARS", monto:"" },
    { moneda:"CLP", monto:"" },
  ]);
  const [errors, setErrors] = useState({});
  const [saving, setSaving] = useState(false);

  function updateMonto(idx, val) {
    setMontos(p => { const n=[...p]; n[idx]={...n[idx],monto:val}; return n; });
  }

  const montosConValor = montos.filter(m => m.monto !== "" && Number(m.monto) > 0);

  function validate() {
    const e={};
    if (!fecha)               e.fecha="Requerido";
    if (!chofer)              e.chofer="Requerido";
    if (!responsable)         e.responsable="Requerido";
    if (!montosConValor.length) e.montos="Ingresá al menos un monto";
    setErrors(e); return Object.keys(e).length===0;
  }

  async function handleSave() {
    if (!validate()) return;
    setSaving(true);
    // Guardar un registro por cada divisa con monto > 0
    // Todos comparten fecha, chofer, responsable y el mismo ID base
    const baseId = "ENT-"+Date.now();
    for (let i=0; i<montosConValor.length; i++) {
      const m = montosConValor[i];
      await onSave({
        fecha, chofer, responsable,
        monto: String(m.monto),
        moneda: m.moneda,
        // Si hay más de una divisa, marcar con sufijo para distinguirlas
        _baseId: baseId,
      });
    }
    setSaving(false);
  }

  return (
    <div className="module-container">
      <div className="module-header">
        <div><div className="module-title">Nueva Entrega de Plata</div></div>
        <button className="btn btn-secondary btn-sm" onClick={onBack}>← Volver</button>
      </div>
      <div className="card" style={{ maxWidth:580 }}>
        <div className="card-body">
          <div className="alert alert-info" style={{ marginBottom:16 }}>
            Los registros no pueden editarse una vez guardados. Podés ingresar montos en las 3 divisas en una misma entrega.
          </div>
          <div className="form-group">
            <label className="form-label">Fecha {errors.fecha && <span className="form-error">{errors.fecha}</span>}</label>
            <input type="date" className="form-input" value={fecha} onChange={e=>setFecha(e.target.value)}/>
          </div>
          <div className="form-group">
            <label className="form-label">
              Chofer (destinatario) {errors.chofer && <span className="form-error">{errors.chofer}</span>}
            </label>
            <SearchableSelect
              options={dropdowns.CHOFERES||[]}
              value={chofer}
              onChange={setChofer}
              placeholder="A quién se entrega..."/>
          </div>
          <div className="form-group">
            <label className="form-label">
              Responsable de la entrega {errors.responsable && <span className="form-error">{errors.responsable}</span>}
            </label>
            <SearchableSelect
              options={dropdowns.COLABORADORES||[]}
              value={responsable}
              onChange={setResponsable}
              placeholder="Quién entrega el dinero..."/>
          </div>

          {/* Montos por divisa */}
          <div className="form-group">
            <label className="form-label">
              Montos {errors.montos && <span className="form-error">{errors.montos}</span>}
            </label>
            <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
              {montos.map((m,i) => (
                <div key={m.moneda} style={{ display:"flex", alignItems:"center", gap:10 }}>
                  <span style={{
                    width:40, fontFamily:"var(--mono)", fontSize:12, fontWeight:600,
                    color: m.monto ? "var(--accent)" : "var(--text3)",
                    flexShrink:0
                  }}>{m.moneda}</span>
                  <MoneyInput
                    value={m.monto}
                    onChange={val => updateMonto(i, val)}
                    placeholder={`Monto en ${m.moneda} (dejar vacío si no aplica)`}
                    style={{ flex:1 }}
                  />
                </div>
              ))}
            </div>
            {montosConValor.length > 0 && (
              <div style={{ marginTop:8, fontSize:12, color:"var(--text3)" }}>
                Se guardarán {montosConValor.length} registro(s): {montosConValor.map(m=>`${m.moneda} ${Number(m.monto).toLocaleString("es-AR")}`).join(" + ")}
              </div>
            )}
          </div>

          <div style={{ display:"flex",gap:10,justifyContent:"flex-end",marginTop:16 }}>
            <button className="btn btn-secondary" onClick={onBack}>Cancelar</button>
            <button className="btn btn-primary" onClick={handleSave} disabled={saving}>
              {saving ? "Guardando..." : `💾 Guardar${montosConValor.length>1?" ("+montosConValor.length+" registros)":""}`}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// MODULE 3 — RENDICIÓN DE GASTOS
// ═══════════════════════════════════════════════════════════════════════════════
function Module3({ session, canEdit, dropdowns, notif }) {
  const [trips,       setTrips]      = useState([]);
  const [entregas,    setEntregas]   = useState([]);
  const [rendiciones, setRendiciones]= useState([]);
  const [selDriver,   setSelDriver]  = useState("");
  const [selSegIds,   setSelSegIds]  = useState([]);
  const [view,        setView]       = useState("list");
  const [loading,     setLoading]    = useState(true);

  useEffect(() => {
    // Usa caché para las tres colecciones — sin llamadas duplicadas al servidor
    Promise.all([
      cachedGet("getTrips","trips"),
      cachedGet("getEntregas","entregas"),
      cachedGet("getRendiciones","rendiciones")
    ]).then(([t,e,r]) => {
      if (t.ok) setTrips(t.data);
      if (e.ok) setEntregas(e.data);
      if (r.ok) setRendiciones(r.data);
      setLoading(false);
    });
  }, []);

  const settledIds = useMemo(() => {
    const s=new Set();
    rendiciones.forEach(r=>(r.segments||[]).forEach(sg=>s.add(sg.segId)));
    return s;
  }, [rendiciones]);

  const unsettled = useMemo(() => {
    const segs=[];
    trips.forEach(trip => {
      if (trip.status==="finalizado"||trip.status==="activo") {
        (trip.segments||[]).forEach(seg => {
          if (!settledIds.has(seg.segId))
            segs.push({ ...seg, tripId:trip.id, tripMonto:trip.montoFactura, tripMoneda:trip.moneda });
        });
      }
    });
    return segs;
  }, [trips, settledIds]);

  const filtered   = selDriver ? unsettled.filter(s=>s.chofer===selDriver) : unsettled;
  const allDrivers = [...new Set(unsettled.map(s=>s.chofer).filter(Boolean))];
  const selSegs    = filtered.filter(s=>selSegIds.includes(s.segId));

  function toggleSeg(segId) {
    setSelSegIds(p=>p.includes(segId)?p.filter(x=>x!==segId):[...p,segId]);
  }

  async function handleSave(data) {
    const r = await gasCall("saveRendicion", { rendicion:data, user:session.username });
    if (r.ok) {
      invalidateCache("trips","rendiciones"); // fuerza recarga después de guardar
      notif.add("Rendición guardada"); setView("list"); setSelSegIds([]);
      Promise.all([
        cachedGet("getTrips","trips"),
        cachedGet("getRendiciones","rendiciones")
      ]).then(([t,r])=>{
        if(t.ok)setTrips(t.data); if(r.ok)setRendiciones(r.data);
      });
    } else notif.add(r.error||"Error","error");
  }

  if (view==="form") return (
    <RendicionForm segs={selSegs} driver={selDriver} entregas={entregas}
      dropdowns={dropdowns}
      onSave={handleSave} onBack={()=>setView("list")} session={session}/>
  );

  return (
    <div className="module-container" style={{ paddingBottom:0 }}>
      <div className="module-header">
        <div>
          <div className="module-title">📊 Rendición de Gastos</div>
          <div className="module-subtitle">Seleccioná tramos para liquidar</div>
        </div>
      </div>
      <div style={{ marginBottom:16, maxWidth:360 }}>
        <div className="form-group" style={{ margin:0 }}>
          <label className="form-label">Seleccioná un chofer para ver sus tramos</label>
          <SearchableSelect
            options={allDrivers.map(d=>({ value:d, label:d }))}
            value={selDriver}
            onChange={v=>{ setSelDriver(v); setSelSegIds([]); }}
            placeholder="Elegir chofer..."
          />
        </div>
      </div>

      {/* Sin chofer seleccionado: mensaje de guía */}
      {!selDriver && (
        <div className="empty"><div className="empty-icon">👤</div><p>Seleccioná un chofer para ver sus tramos pendientes.</p></div>
      )}

      {/* Con chofer seleccionado: spinner, vacío, o tabla */}
      {selDriver && loading && (
        <div style={{ textAlign:"center",padding:32 }}><div className="spinner" style={{ margin:"0 auto" }}/></div>
      )}
      {selDriver && !loading && filtered.length===0 && (
        <div className="empty"><div className="empty-icon">✅</div><p>No hay tramos pendientes para {selDriver}.</p></div>
      )}
      {selDriver && !loading && filtered.length>0 && (
        <div style={{ maxHeight:"calc(100vh - 300px)", overflowY:"auto" }}>
          <div className="table-wrap">
            <table>
              <thead><tr><th></th><th>Tramo</th><th>Viaje</th><th>Chofer</th><th>Desde</th><th>Hasta</th><th>Fecha inicio</th><th>Estado</th></tr></thead>
              <tbody>
                {filtered.map(s=>(
                  <tr key={s.segId}>
                    <td><input type="checkbox" checked={selSegIds.includes(s.segId)} onChange={()=>toggleSeg(s.segId)}/></td>
                    <td style={{ fontFamily:"var(--mono)",fontSize:11 }}>{s.segId}</td>
                    <td style={{ fontFamily:"var(--mono)",fontSize:11 }}>{s.tripId}</td>
                    <td>{s.chofer}</td><td>{s.desde}</td><td>{s.hasta}</td>
                    <td>{fmtDate(s.fechaInicio)}</td>
                    <td><StatusBadge status={s.status}/></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}
      {canEdit && selSegIds.length>0 && (
        <div className="liquidar-bar">
          <span style={{ color:"var(--text2)",fontSize:13 }}>{selSegIds.length} tramo(s) seleccionado(s)</span>
          <button className="btn btn-primary" onClick={()=>setView("form")}>💰 Liquidar</button>
        </div>
      )}
    </div>
  );
}

// ─── RENDICION FORM ───────────────────────────────────────────────────────────
function RendicionForm({ segs, driver, entregas, dropdowns, onSave, onBack, session }) {
  const rendId = "RND-" + Date.now();

  const [segMonto, setSegMonto]   = useState(() => segs.reduce((a,s)=>({...a,[s.segId]:{monto:"",moneda:"USD"}}),{}));
  // expenses: { cat, ARS, CLP, USD } — una fila por categoría, monto por divisa
  // Se inicializa con las categorías del dropdown (o fallback) en cero.
  const [expenses, setExpenses]   = useState(() => {
    const cats = (dropdowns?.CATEGORIA_GASTOS) || [
      "GAS-OIL","PEAJES Y DESINFECCIÓN","ADUANA","LASTRE",
      "GOMERÍA","TELÉFONO","LAVADERO","COIMAS",
      "ESTADÍA","REVISIÓN TÉCNICA","PARQUEADERO","OTRO"
    ];
    return cats.map(cat => ({ cat, ARS:"", CLP:"", USD:"" }));
  });
  const [fuelRows, setFuelRows]   = useState([{ fecha:"", proveedor:"", litros:"", total:"" }]);
  const [kmReales, setKmReales]   = useState(() => segs.reduce((a,s)=>({...a,[s.segId]:""}),{}));
  // FIX #4 — devoluciones por moneda
  const [devolucion, setDevolucion] = useState({ ARS:"", CLP:"", USD:"" });
  const [saving, setSaving]       = useState(false);

  // FIX #3 — Rango de fechas: min(fechaInicio) → max(fechaLlegadaReal) - 1 día
  const allFechasInicio = segs.map(s=>s.fechaInicio).filter(Boolean).sort();
  const allFechasLlegada = segs.map(s=>s.fechaLlegadaReal||s.fechaLlegadaPrevista).filter(Boolean).sort();
  const dateFrom = allFechasInicio[0] || "";
  const dateTo   = allFechasLlegada[allFechasLlegada.length-1] || "";
  // Restar 1 día a dateTo
  const dateToMinus1 = useMemo(() => {
    if (!dateTo) return "";
    const d = new Date(dateTo + "T00:00:00");
    d.setDate(d.getDate() - 1);
    return d.toISOString().slice(0,10);
  }, [dateTo]);

  // Filtro correcto: chofer === driver (campo nuevo en entrega) + rango de fechas
  // Rango: desde mínima fecha inicio viaje hasta máxima fecha real llegada - 1 día (inclusive)
  const driverEntregas = useMemo(() => {
    if (!driver || !dateFrom) return [];
    return entregas.filter(e =>
      e.chofer === driver &&
      e.fecha >= dateFrom &&
      (!dateToMinus1 || e.fecha <= dateToMinus1)
    );
  }, [entregas, driver, dateFrom, dateToMinus1]);

  const entByCur = { ARS:[], CLP:[], USD:[] };
  driverEntregas.forEach(e=>{ if(entByCur[e.moneda]) entByCur[e.moneda].push(e); });
  const entBruto = {
    ARS: entByCur.ARS.reduce((s,e)=>s+Number(e.monto),0),
    CLP: entByCur.CLP.reduce((s,e)=>s+Number(e.monto),0),
    USD: entByCur.USD.reduce((s,e)=>s+Number(e.monto),0),
  };
  // FIX #4 — descontar devoluciones
  const entNeto = {
    ARS: entBruto.ARS - Number(devolucion.ARS||0),
    CLP: entBruto.CLP - Number(devolucion.CLP||0),
    USD: entBruto.USD - Number(devolucion.USD||0),
  };

  // Tasas negociadas con el chofer — vienen de Sheets vía dropdowns
  // TC_USD: cuántos ARS vale 1 USD → multiplicar  (ej: 1200)
  // TC_CLP: cuántos CLP vale 1 ARS → 100/TC_CLP   (ej: 160 = 1 ARS son 160 CLP)
  const TC = {
    USD: dropdowns?.TC_USD || 1200,
    CLP: dropdowns?.TC_CLP || 160,
    ARS: 1
  };
  const toARS = (monto, cur) => {
    if (cur === "ARS") return Number(monto || 0);
    if (cur === "USD") return Number(monto || 0) * TC.USD;
    if (cur === "CLP") return Number(monto || 0) * 100 / TC.CLP;
    return Number(monto || 0);
  };

  const entTotalARS = entNeto.ARS + toARS(entNeto.CLP,"CLP") + toARS(entNeto.USD,"USD");

  // Total montos tramo
  const totalSegARS = segs.reduce((s,seg)=>{
    const m = segMonto[seg.segId]; if (!m?.monto) return s;
    return s + toARS(m.monto, m.moneda);
  }, 0);

  const tripTotal = segs[0]?.tripMonto ? toARS(segs[0].tripMonto, segs[0].tripMoneda||"USD") : Infinity;

  // Gastos — sumar por divisa a través de todas las categorías
  const expTotal = { ARS:0, CLP:0, USD:0 };
  expenses.forEach(e=>{
    expTotal.ARS += Number(e.ARS||0);
    expTotal.CLP += Number(e.CLP||0);
    expTotal.USD += Number(e.USD||0);
  });
  const expTotalARS = expTotal.ARS + toARS(expTotal.CLP,"CLP") + toARS(expTotal.USD,"USD");

  // Combustible
  const totalLitros   = fuelRows.reduce((s,r)=>s+Number(r.litros||0),0);
  const totalKmPrev   = segs.reduce((s,sg)=>s+Number(sg.kmPrevistos||0),0);
  const totalKmReales = Object.values(kmReales).reduce((s,v)=>s+Number(v||0),0);
  const gapKm         = totalKmReales - totalKmPrev;
  const consumo       = totalKmReales>0 ? ((totalLitros/totalKmReales)*100).toFixed(2) : "—";

  // FIX #3 + #4 — Liquidación correcta según spec:
  // PORCENTAJE CHOFER = 13% del total montos tramo (en ARS)
  // ANTICIPO DE SUELDO = total entregado (ARS) − total gastos (ARS) − total devolución (ARS)
  // SALDO CHOFER = porcentaje chofer − anticipo de sueldo
  const porcChofer    = totalSegARS * 0.13;
  const anticipoSueldo = entTotalARS - expTotalARS; // entregado neto − gastos
  const saldoChofer   = porcChofer - anticipoSueldo;

  async function handleSave() {
    setSaving(true);
    // expenses se guarda tal cual: [{ cat, ARS, CLP, USD }, ...]
    await onSave({
      id:rendId, driver, segMonto, expenses, fuelRows, kmReales, devolucion,
      segments:segs,
      totals:{ totalSegARS, porcChofer, anticipoSueldo, saldoChofer, entTotalARS, expTotalARS, consumo }
    });
    setSaving(false);
  }

  return (
    <div className="module-container">
      <div className="module-header">
        <div>
          <div className="module-title">📊 Rendición — {driver}</div>
          <div className="module-subtitle" style={{ fontFamily:"var(--mono)",fontSize:12 }}>{rendId}</div>
        </div>
        <button className="btn btn-secondary btn-sm" onClick={onBack}>← Volver</button>
      </div>

      {/* Tramos precargados + monto + km reales */}
      <div className="card" style={{ marginBottom:16 }}>
        <div className="card-header"><div className="card-title">🗺 Tramos incluidos</div></div>
        <div className="card-body">
          {segs.map(s=>(
            <div key={s.segId} style={{ marginBottom:20, paddingBottom:16, borderBottom:"1px solid var(--border)" }}>
              <div style={{ display:"flex",gap:8,alignItems:"center",marginBottom:8 }}>
                <span style={{ fontFamily:"var(--mono)",fontSize:11,color:"var(--text3)" }}>{s.segId}</span>
                <span style={{ fontSize:13 }}>{s.desde} → {s.hasta}</span>
                <StatusBadge status={s.status}/>
              </div>
              {/* Todos los campos readonly según spec */}
              <div className="form-row" style={{ flexWrap:"wrap",gap:8,marginBottom:8 }}>
                {[
                  ["ID Viaje",s.tripId],["Chofer",s.chofer],["Tractor",s.tractor],["Semi",s.semi],
                  ["Fecha inicio",fmtDate(s.fechaInicio)],["Fecha prev. llegada",fmtDate(s.fechaLlegadaPrevista)],
                  ["Fecha real llegada",fmtDate(s.fechaLlegadaReal)],["Km previstos",fmtKm(s.kmPrevistos)],
                ].map(([l,v])=>(
                  <div key={l} style={{ minWidth:130 }}>
                    <div className="form-label">{l}</div>
                    <div className="field-readonly">{v||"—"}</div>
                  </div>
                ))}
              </div>
              {s.observaciones && <div className="form-hint">Obs: {s.observaciones}</div>}
              <div className="form-row" style={{ marginTop:8, maxWidth:400 }}>
                <div className="form-group">
                  <label className="form-label">Monto tramo *</label>
                  <div className="input-with-currency">
                    <MoneyInput value={segMonto[s.segId]?.monto||""} onChange={v=>setSegMonto(p=>({...p,[s.segId]:{...p[s.segId],monto:v}}))} placeholder="0"/>
                    <select className="form-select" style={{ width:80 }}
                      value={segMonto[s.segId]?.moneda||"USD"}
                      onChange={e=>setSegMonto(p=>({...p,[s.segId]:{...p[s.segId],moneda:e.target.value}}))}>
                      {CURRENCIES.map(c=><option key={c} value={c}>{c}</option>)}
                    </select>
                  </div>
                </div>
                <div className="form-group">
                  <label className="form-label">Km reales *</label>
                  <input className="form-input" type="number" placeholder="km"
                    value={kmReales[s.segId]||""}
                    onChange={e=>setKmReales(p=>({...p,[s.segId]:e.target.value}))}/>
                </div>
              </div>
              {totalSegARS > tripTotal && (
                <div className="alert alert-danger" style={{ marginTop:8 }}>
                  ⚠️ El total de tramos supera el monto del viaje. Disponible: {fmtNum(tripTotal - totalSegARS + toARS(segMonto[s.segId]?.monto||0, segMonto[s.segId]?.moneda||"USD"))} ARS
                </div>
              )}
            </div>
          ))}
          <div style={{ display:"flex",gap:20,paddingTop:8 }}>
            <span style={{ fontSize:13,color:"var(--text2)" }}>Km previstos total: <strong>{fmtKm(totalKmPrev)}</strong></span>
            <span style={{ fontSize:13,color:"var(--text2)" }}>Km reales total: <strong>{fmtKm(totalKmReales)}</strong></span>
            <span style={{ fontSize:13,color:gapKm>0?"var(--warning)":"var(--success)" }}>
              Gap: <strong>{gapKm>0?"+":""}{gapKm.toLocaleString("es-AR")} km</strong>
            </span>
          </div>
        </div>
      </div>

      {/* Dinero entregado al chofer */}
      <div className="card" style={{ marginBottom:16 }}>
        <div className="card-header"><div className="card-title">💵 Dinero entregado al chofer</div></div>
        <div className="card-body">
          <div className="form-hint" style={{ marginBottom:12 }}>
            Período: {fmtDate(dateFrom)} — {fmtDate(dateToMinus1||dateTo)}
            <span style={{ marginLeft:8, color:"var(--text3)" }}>(hasta el día anterior a la llegada)</span>
          </div>
          {CURRENCIES.map(cur=>(
            <div key={cur} style={{ marginBottom:16 }}>
              <div className="section-label">{cur}</div>
              {entByCur[cur].length===0
                ? <div style={{ fontSize:12,color:"var(--text3)",marginBottom:8 }}>Sin entregas</div>
                : (
                  <div className="table-wrap" style={{ marginBottom:8 }}>
                    <table>
                      <thead><tr><th>Fecha</th><th>Responsable</th><th>Monto</th><th>Equiv. ARS</th></tr></thead>
                      <tbody>
                        {entByCur[cur].map(e=>(
                          <tr key={e.id}>
                            <td>{fmtDate(e.fecha)}</td>
                            <td>{e.responsable}</td>
                            <td style={{ fontFamily:"var(--mono)" }}>{fmtNum(e.monto)}</td>
                            <td style={{ fontFamily:"var(--mono)",color:"var(--text3)" }}>{fmtNum(toARS(e.monto,cur))}</td>
                          </tr>
                        ))}
                        <tr>
                          <td colSpan={2} style={{ fontWeight:600,color:"var(--text)" }}>Subtotal {cur}</td>
                          <td style={{ fontFamily:"var(--mono)",fontWeight:600,color:"var(--text)" }}>{fmtNum(entBruto[cur])}</td>
                          <td style={{ fontFamily:"var(--mono)",color:"var(--text3)" }}>{fmtNum(toARS(entBruto[cur],cur))}</td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                )
              }
              {/* FIX #4 — campo devolución por moneda */}
              <div style={{ display:"flex",alignItems:"center",gap:10,maxWidth:280 }}>
                <label className="form-label" style={{ margin:0,whiteSpace:"nowrap" }}>Devolución {cur}</label>
                <input className="form-input" type="number" min="0" step="0.01"
                  value={devolucion[cur]}
                  onChange={e=>setDevolucion(p=>({...p,[cur]:e.target.value}))}
                  placeholder="0.00" style={{ maxWidth:160 }}/>
              </div>
              {Number(devolucion[cur])>0 && (
                <div style={{ fontSize:12,color:"var(--success)",marginTop:4 }}>
                  Neto {cur}: {fmtNum(entNeto[cur])} ({fmtNum(toARS(entNeto[cur],cur))} ARS)
                </div>
              )}
            </div>
          ))}
          <div style={{ textAlign:"right",fontWeight:600,fontSize:14,borderTop:"1px solid var(--border)",paddingTop:12 }}>
            Total entregado neto (ARS equiv.): {fmtNum(entTotalARS)}
          </div>
        </div>
      </div>

      {/* Gastos — tabla por divisa, una fila por categoría */}
      <div className="card" style={{ marginBottom:16 }}>
        <div className="card-header">
          <div className="card-title">📋 Gastos</div>
        </div>
        <div className="card-body">
          <GastosTabla
            dropdowns={dropdowns}
            expenses={expenses}
            setExpenses={setExpenses}
            expTotal={expTotal}
            expTotalARS={expTotalARS}
            toARS={toARS}
          />
        </div>
      </div>

      {/* Combustible */}
      <div className="card" style={{ marginBottom:16 }}>
        <div className="card-header">
          <div className="card-title">⛽ Combustible</div>
          <button className="btn btn-secondary btn-sm" onClick={()=>setFuelRows(p=>[...p,{fecha:"",proveedor:"",litros:"",total:""}])}>+ Carga</button>
        </div>
        <div className="card-body">
          <div style={{ marginBottom:12 }}>
            <span style={{ fontSize:13,color:"var(--text2)" }}>Km previstos (lectura): </span>
            <span style={{ fontFamily:"var(--mono)",fontSize:13 }}>{fmtKm(totalKmPrev)}</span>
          </div>
          {fuelRows.map((f,i)=>(
            <div key={i} className="form-row" style={{ alignItems:"flex-end",marginBottom:8 }}>
              <div className="form-group">
                <label className="form-label">Fecha</label>
                <input type="date" className="form-input" value={f.fecha}
                  onChange={e=>{ const n=[...fuelRows];n[i]={...n[i],fecha:e.target.value};setFuelRows(n); }}/>
              </div>
              <div className="form-group" style={{ flex:2 }}>
                <label className="form-label">Proveedor</label>
                {/* CAMBIO 7 — desplegable desde hoja "ESTACIONES_COMBUSTIBLES" */}
                <SearchableSelect
                  options={dropdowns?.ESTACIONES_COMBUSTIBLES||["YPF","SHELL","AXION","PUMA","OTRO"]}
                  value={f.proveedor}
                  onChange={v=>{ const n=[...fuelRows];n[i]={...n[i],proveedor:v};setFuelRows(n); }}
                  placeholder="Buscar estación..."
                />
              </div>
              <div className="form-group">
                <label className="form-label">Litros</label>
                <input className="form-input" type="number" value={f.litros}
                  onChange={e=>{ const n=[...fuelRows];n[i]={...n[i],litros:e.target.value};setFuelRows(n); }}/>
              </div>
              <div className="form-group">
                <label className="form-label">Total factura</label>
                <MoneyInput value={f.total} onChange={v=>{ const n=[...fuelRows];n[i]={...n[i],total:v};setFuelRows(n); }} placeholder="0"/>
              </div>
              <div className="form-group" style={{ maxWidth:100 }}>
                <label className="form-label">$/L</label>
                <div className="field-readonly">{f.litros&&f.total?(Number(f.total)/Number(f.litros)).toFixed(2):"—"}</div>
              </div>
              <button className="btn btn-danger btn-sm btn-icon" onClick={()=>setFuelRows(p=>p.filter((_,idx)=>idx!==i))}>✕</button>
            </div>
          ))}
          <div style={{ display:"flex",gap:24,borderTop:"1px solid var(--border)",paddingTop:12,marginTop:8,flexWrap:"wrap" }}>
            <span style={{ fontSize:13,color:"var(--text2)" }}>Total litros: <strong>{fmtNum(totalLitros)}</strong></span>
            <span style={{ fontSize:13,color:"var(--text2)" }}>Km reales totales: <strong>{fmtKm(totalKmReales)}</strong></span>
            <span style={{ fontSize:13,color:gapKm>0?"var(--warning)":"var(--success)" }}>
              Gap: <strong>{gapKm>0?"+":""}{gapKm.toLocaleString("es-AR")} km</strong>
            </span>
            <span style={{ fontSize:13,color:"var(--text2)" }}>Consumo: <strong>{consumo} L/100km</strong></span>
          </div>
        </div>
      </div>

      {/* FIX #3 — Liquidación final con fórmulas correctas */}
      <div className="card" style={{ marginBottom:80 }}>
        <div className="card-header"><div className="card-title">💰 Liquidación final — {driver}</div></div>
        <div className="card-body">
          <div style={{ background:"var(--bg3)",borderRadius:"var(--radius)",padding:"20px",display:"flex",flexDirection:"column",gap:4 }}>

            {/* Porcentaje chofer */}
            <div className="liq-row highlight">
              <div>
                <div style={{ fontSize:13,fontWeight:600,color:"var(--text)" }}>Porcentaje del chofer (13%)</div>
                <div style={{ fontSize:11,color:"var(--text3)" }}>13% de {fmtNum(totalSegARS)} ARS en montos de tramos</div>
              </div>
              <span style={{ fontFamily:"var(--mono)",fontSize:16,fontWeight:600,color:"var(--success)" }}>
                {fmtNum(porcChofer)} ARS
              </span>
            </div>

            <div style={{ height:8 }}/>

            {/* Desglose del anticipo */}
            <div className="liq-row">
              <span style={{ fontSize:13,color:"var(--text2)" }}>Total entregado neto al chofer</span>
              <span style={{ fontFamily:"var(--mono)",fontSize:13,color:"var(--text2)" }}>{fmtNum(entTotalARS)} ARS</span>
            </div>
            <div className="liq-row">
              <span style={{ fontSize:13,color:"var(--text2)" }}>Total gastos</span>
              <span style={{ fontFamily:"var(--mono)",fontSize:13,color:"var(--danger)" }}>− {fmtNum(expTotalARS)} ARS</span>
            </div>

            {/* Anticipo de sueldo */}
            <div className="liq-row highlight">
              <div>
                <div style={{ fontSize:13,fontWeight:600,color:"var(--text)" }}>Anticipo de sueldo</div>
                <div style={{ fontSize:11,color:"var(--text3)" }}>Entregado neto − gastos</div>
              </div>
              <span style={{ fontFamily:"var(--mono)",fontSize:15,fontWeight:600,color:anticipoSueldo<0?"var(--danger)":"var(--warning)" }}>
                {anticipoSueldo<0?"−":""}{fmtNum(Math.abs(anticipoSueldo))} ARS
              </span>
            </div>

            <div style={{ height:8 }}/>

            {/* Saldo chofer */}
            <div className="liq-row highlight" style={{ border:"2px solid var(--accent)",background:"rgba(79,127,255,0.08)" }}>
              <div>
                <div style={{ fontSize:14,fontWeight:600,color:"var(--text)" }}>Saldo chofer</div>
                <div style={{ fontSize:11,color:"var(--text3)" }}>Porcentaje chofer − anticipo de sueldo</div>
              </div>
              <span style={{ fontFamily:"var(--mono)",fontSize:18,fontWeight:600,color:saldoChofer>=0?"var(--success)":"var(--danger)" }}>
                {saldoChofer<0?"−":""}{fmtNum(Math.abs(saldoChofer))} ARS
              </span>
            </div>
          </div>
        </div>
      </div>

      <div className="save-bar">
        <button className="btn btn-secondary" onClick={onBack}>Cancelar</button>
        <button className="btn btn-primary" onClick={handleSave} disabled={saving}>{saving?"Guardando...":"💾 Guardar Rendición"}</button>
      </div>
    </div>
  );
}


// ═══════════════════════════════════════════════════════════════════════════════
// GASTOS TABLA
// Tabla de gastos por divisa. Cada fila = una categoría de gasto.
// Columnas: Categoría | ARS | CLP | USD
// Las categorías vienen del dropdown CATEGORIA_GASTOS (hoja Google Sheets).
// Si una celda está vacía, no suma nada. El total por divisa se muestra al pie.
// ═══════════════════════════════════════════════════════════════════════════════
function GastosTabla({ dropdowns, expenses, setExpenses, expTotal, expTotalARS, toARS }) {
  function updateCell(idx, cur, val) {
    setExpenses(p => {
      const n = [...p];
      n[idx] = { ...n[idx], [cur]: val };
      return n;
    });
  }

  return (
    <>
      <div className="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Categoría</th>
              <th style={{ textAlign:"right", width:140 }}>ARS</th>
              <th style={{ textAlign:"right", width:140 }}>CLP</th>
              <th style={{ textAlign:"right", width:140 }}>USD</th>
            </tr>
          </thead>
          <tbody>
            {expenses.map((e,i) => (
              <tr key={e.cat}>
                <td style={{ color:"var(--text)", fontWeight:500 }}>{e.cat}</td>
                {["ARS","CLP","USD"].map(cur => (
                  <td key={cur} style={{ padding:"6px 8px" }}>
                    <MoneyInput
                      value={e[cur]}
                      onChange={v => updateCell(i, cur, v)}
                      placeholder=""
                      style={{ textAlign:"right", fontSize:12, padding:"5px 8px" }}
                    />
                  </td>
                ))}
              </tr>
            ))}
          </tbody>
          <tfoot>
            <tr style={{ background:"var(--bg4)" }}>
              <td style={{ fontWeight:600, color:"var(--text)", padding:"10px 14px" }}>Total</td>
              {["ARS","CLP","USD"].map(cur => (
                <td key={cur} style={{ fontFamily:"var(--mono)", fontWeight:600, color:"var(--text)", textAlign:"right", padding:"10px 14px" }}>
                  {expTotal[cur] > 0 ? fmtNum(expTotal[cur]) : "—"}
                  {expTotal[cur] > 0 && cur !== "ARS" && (
                    <div style={{ fontSize:10, color:"var(--text3)", fontWeight:400 }}>
                      ≈ {fmtNum(toARS(expTotal[cur], cur))} ARS
                    </div>
                  )}
                </td>
              ))}
            </tr>
          </tfoot>
        </table>
      </div>
      <div style={{ textAlign:"right", fontWeight:600, fontSize:14, borderTop:"1px solid var(--border)", paddingTop:12, marginTop:12 }}>
        Total gastos ARS equiv.: {fmtNum(expTotalARS)}
      </div>
    </>
  );
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
